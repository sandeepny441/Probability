<svg width="100%" viewBox="0 0 1181 1331" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Loan officer analytics - data a wholesale lender watches</title>
<desc>An infographic describing loan officer analytics details that a wholesale lender may prioritize, including profile, production, pull-through, pricing, operations, risk, relationship, and market signals.</desc>

<defs>
  <style>
    .bg { fill: #fbfcff; }
    .navy { fill: #10245c; }
    .title { fill: #10245c; font: 700 34px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; letter-spacing: 1px; }
    .subtitle { fill: #2c3348; font: 400 18px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .banner { fill: #ffffff; font: 700 18px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; letter-spacing: .4px; }
    .banner-sub { fill: #10245c; font: 400 14px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .card-title { font: 700 15px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .card-sub { fill: #111827; font: 600 12px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .body { fill: #111827; font: 400 12px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .body-small { fill: #111827; font: 400 11px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .section-label { font: 700 12px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .mini-title { fill: #10245c; font: 700 13px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .mini-body { fill: #111827; font: 400 11px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .take-title { fill: #111827; font: 700 15px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
    .take-body { fill: #111827; font: 400 13px "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
  </style>
  <linearGradient id="g-green" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f1fbf4"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="g-blue" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f1f7ff"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="g-purple" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f7f3ff"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="g-orange" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#fff7ed"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="g-teal" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#effdfa"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="g-red" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#fff1f2"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="g-gold" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#fff9e7"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <linearGradient id="g-gray" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f4f6f8"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
</defs>

<rect class="bg" x="0" y="0" width="1181" height="1331"/>

<text class="title" x="590.5" y="38" text-anchor="middle">LOAN OFFICER ANALYTICS - DATA LENDERS WATCH</text>
<text class="subtitle" x="590.5" y="68" text-anchor="middle">Representative signals a UWM-like wholesale lender may use to evaluate production, quality, and growth</text>

<rect class="navy" x="38" y="84" width="1105" height="34" rx="12"/>
<text class="banner" x="590.5" y="107" text-anchor="middle">WHAT WE TRACK ABOUT THE LO / BROKER RELATIONSHIP</text>
<text class="banner-sub" x="590.5" y="138" text-anchor="middle">A strong LO profile is not just volume - it combines pull-through, file quality, margin discipline, risk, and engagement.</text>

<!-- 1. LO profile -->
<g transform="translate(24 160)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-green)" stroke="#52b879" stroke-width="1"/>
  <circle cx="39" cy="34" r="13" fill="#0c8b4a"/>
  <path d="M19 76c3-21 37-21 40 0z" fill="#0c8b4a"/>
  <text class="card-title" x="72" y="28" fill="#0c8b4a">1. LO &amp; BROKER PROFILE</text>
  <text class="card-sub" x="72" y="48">Who the producer is</text>
  <g class="body">
    <text x="16" y="98">- LO name, NMLS ID, contact details</text>
    <text x="16" y="120">- Broker shop, branch, team, role</text>
    <text x="16" y="142">- Licensed states and active markets</text>
    <text x="16" y="164">- Tenure, seniority, prior production</text>
    <text x="16" y="186">- Account Executive ownership</text>
    <text x="16" y="208">- Channel status: active, dormant, new</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#9cd7b2" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#0c8b4a">Data sources</text>
  <text class="body-small" x="28" y="264">NMLS, broker agreement, CRM profile, licensing feeds</text>
</g>

<!-- 2. Production and pipeline -->
<g transform="translate(410 160)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-blue)" stroke="#6aa3e8" stroke-width="1"/>
  <rect x="24" y="52" width="12" height="26" rx="2" fill="#0757b8"/>
  <rect x="42" y="38" width="12" height="40" rx="2" fill="#0757b8"/>
  <rect x="60" y="24" width="12" height="54" rx="2" fill="#0757b8"/>
  <text class="card-title" x="90" y="28" fill="#0757b8">2. PRODUCTION &amp; PIPELINE</text>
  <text class="card-sub" x="90" y="48">How much business is moving</text>
  <g class="body">
    <text x="16" y="98">- Applications, submissions, locks</text>
    <text x="16" y="120">- Funded loans and funded volume</text>
    <text x="16" y="142">- Average loan size and unit count</text>
    <text x="16" y="164">- Pipeline by stage and closing month</text>
    <text x="16" y="186">- Month-over-month momentum</text>
    <text x="16" y="208">- Forecasted closings and capacity</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#a7c9f2" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#0757b8">Core KPIs</text>
  <text class="body-small" x="28" y="264">Submission volume, locks, fundings, pipeline aging</text>
</g>

<!-- 3. Conversion -->
<g transform="translate(796 160)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-purple)" stroke="#9b7ad7" stroke-width="1"/>
  <path d="M24 24h54l-21 27v21l-11 6V51z" fill="#6736a8"/>
  <text class="card-title" x="96" y="24" fill="#6736a8">3. CONVERSION &amp;</text>
  <text class="card-title" x="96" y="42" fill="#6736a8">PULL-THROUGH</text>
  <text class="card-sub" x="96" y="62">Whether files actually close</text>
  <g class="body">
    <text x="16" y="98">- Submission-to-lock conversion</text>
    <text x="16" y="120">- Lock-to-close pull-through</text>
    <text x="16" y="142">- Fallout, withdrawn, denied files</text>
    <text x="16" y="164">- Lock extensions and relocks</text>
    <text x="16" y="186">- Time from approval to close</text>
    <text x="16" y="208">- Reason codes for lost loans</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#c5b5ea" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#6736a8">Why it matters</text>
  <text class="body-small" x="28" y="264">High volume is weaker if pull-through is poor</text>
</g>

<!-- 4. Product and borrower mix -->
<g transform="translate(24 474)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-orange)" stroke="#f0a35b" stroke-width="1"/>
  <rect x="24" y="25" width="54" height="40" rx="6" fill="#e66a24"/>
  <path d="M34 39h34M34 51h24" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <text class="card-title" x="96" y="28" fill="#d85a1f">4. PRODUCT &amp; BORROWER MIX</text>
  <text class="card-sub" x="96" y="48">What kind of loans the LO brings</text>
  <g class="body">
    <text x="16" y="98">- Conventional, FHA, VA, USDA mix</text>
    <text x="16" y="120">- Purchase vs refinance share</text>
    <text x="16" y="142">- Occupancy and property type</text>
    <text x="16" y="164">- FICO, LTV, CLTV, DTI bands</text>
    <text x="16" y="186">- First-time buyer and DPA usage</text>
    <text x="16" y="208">- Loan purpose, term, lien position</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#f4bd8a" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#d85a1f">Segmentation</text>
  <text class="body-small" x="28" y="264">Helps compare LOs fairly by loan complexity</text>
</g>

<!-- 5. Pricing -->
<g transform="translate(410 474)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-teal)" stroke="#4db7aa" stroke-width="1"/>
  <circle cx="51" cy="47" r="30" fill="#0e8a80"/>
  <text x="51" y="59" text-anchor="middle" fill="#ffffff" font="700 31px Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">$</text>
  <text class="card-title" x="96" y="28" fill="#0e7d74">5. PRICING &amp; PROFITABILITY</text>
  <text class="card-sub" x="96" y="48">Economic quality of the business</text>
  <g class="body">
    <text x="16" y="98">- Rate, price, points, lender credits</text>
    <text x="16" y="120">- Margin or gain-on-sale proxy</text>
    <text x="16" y="142">- Price exceptions and concessions</text>
    <text x="16" y="164">- Lock extension cost and frequency</text>
    <text x="16" y="186">- Competitor quote pressure</text>
    <text x="16" y="208">- Discount-heavy or thin-margin files</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#98d7d0" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#0e7d74">Business question</text>
  <text class="body-small" x="28" y="264">Is the LO driving profitable, durable volume?</text>
</g>

<!-- 6. Operational quality -->
<g transform="translate(796 474)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-red)" stroke="#ed8fa0" stroke-width="1"/>
  <rect x="24" y="20" width="54" height="62" rx="6" fill="#df3152"/>
  <path d="M37 39l8 8 18-20M37 61h28" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text class="card-title" x="96" y="28" fill="#d92649">6. OPERATIONAL QUALITY</text>
  <text class="card-sub" x="96" y="48">How cleanly files move</text>
  <g class="body">
    <text x="16" y="98">- Submission completeness</text>
    <text x="16" y="120">- Conditions per file</text>
    <text x="16" y="142">- Underwriting touches</text>
    <text x="16" y="164">- Docs returned or reworked</text>
    <text x="16" y="186">- Cycle time by milestone</text>
    <text x="16" y="208">- Closing defects or delay reasons</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#f1b0bc" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#d92649">Operational signal</text>
  <text class="body-small" x="28" y="264">Fast, clean files get better service capacity</text>
</g>

<!-- 7. Risk and compliance -->
<g transform="translate(24 788)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-gold)" stroke="#d7a33a" stroke-width="1"/>
  <path d="M51 19l29 12v19c0 23-16 40-29 47-13-7-29-24-29-47V31z" fill="#bc7b00"/>
  <path d="M38 54l9 9 18-25" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text class="card-title" x="96" y="28" fill="#a56c00">7. RISK &amp; COMPLIANCE</text>
  <text class="card-sub" x="96" y="48">Whether the book creates future issues</text>
  <g class="body">
    <text x="16" y="98">- Early payment default signals</text>
    <text x="16" y="120">- Repurchase or indemnification risk</text>
    <text x="16" y="142">- Fraud, QC, occupancy findings</text>
    <text x="16" y="164">- Disclosure timing and fee tolerance</text>
    <text x="16" y="186">- HMDA and fair-lending review fields</text>
    <text x="16" y="208">- State licensing alignment</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#e8c680" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#a56c00">Risk lens</text>
  <text class="body-small" x="28" y="264">Low defect volume is more valuable than noisy volume</text>
</g>

<!-- 8. Relationship -->
<g transform="translate(410 788)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-blue)" stroke="#79abd5" stroke-width="1"/>
  <circle cx="40" cy="38" r="17" fill="#1a77a6"/>
  <circle cx="66" cy="38" r="17" fill="#2aa0bc" opacity="0.9"/>
  <path d="M30 68c8-16 39-16 47 0" fill="#1a77a6"/>
  <path d="M52 68c8-16 39-16 47 0" fill="#2aa0bc" opacity="0.9"/>
  <text class="card-title" x="106" y="24" fill="#1a6c98">8. RELATIONSHIP &amp;</text>
  <text class="card-title" x="106" y="42" fill="#1a6c98">ENGAGEMENT</text>
  <text class="card-sub" x="106" y="62">How the LO works with the lender</text>
  <g class="body">
    <text x="16" y="98">- Portal logins and pricing scenarios</text>
    <text x="16" y="120">- Training and webinar participation</text>
    <text x="16" y="142">- Account Executive touches</text>
    <text x="16" y="164">- Responsiveness to conditions</text>
    <text x="16" y="186">- Product adoption and campaign response</text>
    <text x="16" y="208">- Support tickets and service feedback</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#a9cce8" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#1a6c98">Growth signal</text>
  <text class="body-small" x="28" y="264">Engaged LOs are easier to coach and retain</text>
</g>

<!-- 9. Market -->
<g transform="translate(796 788)">
  <rect x="0" y="0" width="361" height="292" rx="10" fill="url(#g-gray)" stroke="#9aa4b2" stroke-width="1"/>
  <path d="M52 20c-16 0-29 13-29 29 0 22 29 50 29 50s29-28 29-50c0-16-13-29-29-29z" fill="#4d5968"/>
  <circle cx="52" cy="49" r="11" fill="#ffffff"/>
  <text class="card-title" x="96" y="24" fill="#3e4a5b">9. MARKET &amp; GROWTH</text>
  <text class="card-title" x="96" y="42" fill="#3e4a5b">OPPORTUNITY</text>
  <text class="card-sub" x="96" y="62">Where the next dollar may come from</text>
  <g class="body">
    <text x="16" y="98">- Counties, states, and local footprint</text>
    <text x="16" y="120">- Realtor or builder referral patterns</text>
    <text x="16" y="142">- Dormant LOs and reactivation targets</text>
    <text x="16" y="164">- Product gaps by market</text>
    <text x="16" y="186">- Seasonality and purchase cycles</text>
    <text x="16" y="208">- Share-of-wallet opportunity</text>
  </g>
  <rect x="14" y="222" width="333" height="54" rx="8" fill="#ffffff" stroke="#c0c7d0" stroke-width="1"/>
  <text class="section-label" x="28" y="244" fill="#3e4a5b">Action</text>
  <text class="body-small" x="28" y="264">Prioritize coaching, pricing, products, and AE coverage</text>
</g>

<!-- Outputs strip -->
<g transform="translate(24 1105)">
  <rect x="0" y="0" width="1133" height="102" rx="10" fill="#ffffff" stroke="#c6ccd6" stroke-width="1"/>
  <text class="mini-title" x="28" y="30">COMMON ANALYTIC OUTPUTS</text>
  <line x1="282" y1="20" x2="282" y2="84" stroke="#c6ccd6" stroke-width="1"/>
  <line x1="565" y1="20" x2="565" y2="84" stroke="#c6ccd6" stroke-width="1"/>
  <line x1="848" y1="20" x2="848" y2="84" stroke="#c6ccd6" stroke-width="1"/>
  <text class="mini-title" x="308" y="30">LO SCORECARD</text>
  <text class="mini-body" x="308" y="52">Volume, pull-through, speed, margin,</text>
  <text class="mini-body" x="308" y="70">quality, risk, and engagement rank.</text>
  <text class="mini-title" x="591" y="30">COACHING QUEUES</text>
  <text class="mini-body" x="591" y="52">Which LOs need pricing help, doc-quality</text>
  <text class="mini-body" x="591" y="70">support, product training, or AE attention.</text>
  <text class="mini-title" x="874" y="30">GROWTH TARGETS</text>
  <text class="mini-body" x="874" y="52">Who can expand into new products,</text>
  <text class="mini-body" x="874" y="70">markets, referral channels, or higher volume.</text>
  <text class="mini-body" x="28" y="55">Representative analytics only;</text>
  <text class="mini-body" x="28" y="73">not proprietary UWM reporting.</text>
</g>

<!-- Key takeaway -->
<g transform="translate(24 1234)">
  <rect x="0" y="0" width="1133" height="72" rx="10" fill="#fff7df" stroke="#e0ad4d" stroke-width="1"/>
  <circle cx="38" cy="36" r="21" fill="#f8d280"/>
  <path d="M38 18v10M38 44v10M20 36h10M46 36h10M25 23l7 7M51 23l-7 7" stroke="#8b5a00" stroke-width="3" stroke-linecap="round"/>
  <text class="take-title" x="78" y="29">KEY TAKEAWAY</text>
  <text class="take-body" x="78" y="48">A wholesale lender values LOs who bring steady volume, closeable files, clean documentation,</text>
  <text class="take-body" x="78" y="64">profitable pricing, low risk, and responsive partnership behavior.</text>
</g>
</svg>
