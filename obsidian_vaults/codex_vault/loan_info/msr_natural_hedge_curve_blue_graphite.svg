<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MSR value versus origination income as rates move, blue graphite theme</title>
<desc>A blue-graphite dark variation of the natural hedge chart with aqua and soft rose curves.</desc>

<rect x="0" y="0" width="680" height="410" fill="#374348"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">
  <rect x="90" y="26" width="12" height="12" rx="3" fill="#67D3C5"/>
  <text x="110" y="36" fill="#D1D8D8" font-size="12">MSR value</text>

  <rect x="210" y="26" width="12" height="12" rx="3" fill="#F08B83"/>
  <text x="230" y="36" fill="#D1D8D8" font-size="12">Origination income</text>

  <line x1="380" y1="32" x2="404" y2="32" stroke="#B7C1C1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="412" y="36" fill="#D1D8D8" font-size="12">Combined (the hedge)</text>
</g>

<line x1="80" y1="60" x2="80" y2="340" stroke="#8C9899" stroke-width="0.5" opacity="0.8"/>
<line x1="80" y1="340" x2="620" y2="340" stroke="#8C9899" stroke-width="0.5" opacity="0.8"/>
<line x1="350" y1="60" x2="350" y2="340" stroke="#8C9899" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>

<path d="M80 305 C 180 298, 250 260, 350 200 S 530 105, 620 95" fill="none" stroke="#67D3C5" stroke-width="2.6" stroke-linecap="round"/>
<path d="M80 95 C 180 102, 250 140, 350 200 S 530 295, 620 305" fill="none" stroke="#F08B83" stroke-width="2.6" stroke-linecap="round"/>
<path d="M80 202 C 200 198, 480 202, 620 198" fill="none" stroke="#B7C1C1" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.88"/>

<circle cx="350" cy="200" r="4" fill="#B7C1C1"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif" fill="#D1D8D8" font-size="12">
  <text x="80" y="362" text-anchor="middle">-2%</text>
  <text x="215" y="362" text-anchor="middle">-1%</text>
  <text x="350" y="362" text-anchor="middle">Today</text>
  <text x="485" y="362" text-anchor="middle">+1%</text>
  <text x="620" y="362" text-anchor="middle">+2%</text>
</g>

<text x="350" y="392" text-anchor="middle" fill="#EDF1EF" font-size="14" font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">Change in market rates</text>
</svg>
