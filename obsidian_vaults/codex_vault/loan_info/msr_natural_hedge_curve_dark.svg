<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MSR value versus origination income as rates move, dark theme</title>
<desc>A dark gray version of the natural hedge chart showing that MSR values rise as origination income falls, while the combined value stays roughly flat.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="680" height="410" fill="#303236"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">
  <rect x="90" y="26" width="12" height="12" rx="3" fill="#61D6A6"/>
  <text x="110" y="36" fill="#C9C5BA" font-size="12">MSR value</text>

  <rect x="210" y="26" width="12" height="12" rx="3" fill="#FF9368"/>
  <text x="230" y="36" fill="#C9C5BA" font-size="12">Origination income</text>

  <line x1="380" y1="32" x2="404" y2="32" stroke="#B0ABA1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="412" y="36" fill="#C9C5BA" font-size="12">Combined (the hedge)</text>
</g>

<line x1="80" y1="60" x2="80" y2="340" stroke="#807C74" stroke-width="0.5"/>
<line x1="80" y1="340" x2="620" y2="340" stroke="#807C74" stroke-width="0.5"/>
<line x1="350" y1="60" x2="350" y2="340" stroke="#807C74" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.55"/>

<path d="M80 305 C 180 298, 250 260, 350 200 S 530 105, 620 95" fill="none" stroke="#61D6A6" stroke-width="2.5" stroke-linecap="round"/>
<path d="M80 95 C 180 102, 250 140, 350 200 S 530 295, 620 305" fill="none" stroke="#FF9368" stroke-width="2.5" stroke-linecap="round"/>
<path d="M80 202 C 200 198, 480 202, 620 198" fill="none" stroke="#B0ABA1" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.9"/>

<circle cx="350" cy="200" r="4" fill="#B0ABA1"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif" fill="#C9C5BA" font-size="12">
  <text x="80" y="362" text-anchor="middle">-2%</text>
  <text x="215" y="362" text-anchor="middle">-1%</text>
  <text x="350" y="362" text-anchor="middle">Today</text>
  <text x="485" y="362" text-anchor="middle">+1%</text>
  <text x="620" y="362" text-anchor="middle">+2%</text>
</g>

<text x="350" y="392" text-anchor="middle" fill="#EEEAE1" font-size="14" font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">Change in market rates</text>
</svg>
