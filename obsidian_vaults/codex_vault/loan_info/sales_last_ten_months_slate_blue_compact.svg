<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sales over the last ten months</title>
<desc>A lighter slate-blue editorial-style ten-bar sales histogram with adjacent bars and distinct colors.</desc>

<rect x="0" y="0" width="680" height="410" fill="#56636D"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">
  <text x="80" y="38" fill="#F3F7F8" font-size="16">Sales over the last ten months</text>
  <text x="80" y="58" fill="#D7DEE4" font-size="12">Monthly sales, illustrative values</text>

  <line x1="80" y1="80" x2="80" y2="340" stroke="#B3BEC6" stroke-width="0.5" opacity="0.72"/>
  <line x1="80" y1="340" x2="620" y2="340" stroke="#B3BEC6" stroke-width="0.5" opacity="0.72"/>

  <line x1="80" y1="275" x2="620" y2="275" stroke="#B3BEC6" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.23"/>
  <line x1="80" y1="210" x2="620" y2="210" stroke="#B3BEC6" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.23"/>
  <line x1="80" y1="145" x2="620" y2="145" stroke="#B3BEC6" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.23"/>

  <g fill="#D7DEE4" font-size="11" text-anchor="end">
    <text x="68" y="344">0</text>
    <text x="68" y="279">25</text>
    <text x="68" y="214">50</text>
    <text x="68" y="149">75</text>
  </g>

  <g font-size="12" text-anchor="middle">
    <rect x="80" y="234" width="54" height="106" fill="#7ED7F2"/>
    <text x="107" y="216" fill="#F3F7F8">41</text>
    <text x="107" y="231" fill="#FFD36A" font-size="11">+3%</text>
    <text x="107" y="364" fill="#E4EAEE">Oct</text>

    <rect x="134" y="218" width="54" height="122" fill="#F3A46D"/>
    <text x="161" y="200" fill="#F3F7F8">47</text>
    <text x="161" y="215" fill="#FFD36A" font-size="11">+15%</text>
    <text x="161" y="364" fill="#E4EAEE">Nov</text>

    <rect x="188" y="195" width="54" height="145" fill="#67D3C5"/>
    <text x="215" y="177" fill="#F3F7F8">56</text>
    <text x="215" y="192" fill="#FFD36A" font-size="11">+19%</text>
    <text x="215" y="364" fill="#E4EAEE">Dec</text>

    <rect x="242" y="226" width="54" height="114" fill="#F08B83"/>
    <text x="269" y="208" fill="#F3F7F8">44</text>
    <text x="269" y="223" fill="#FFD36A" font-size="11">-21%</text>
    <text x="269" y="364" fill="#E4EAEE">Jan</text>

    <rect x="296" y="184" width="54" height="156" fill="#92C9FF"/>
    <text x="323" y="166" fill="#F3F7F8">60</text>
    <text x="323" y="181" fill="#FFD36A" font-size="11">+36%</text>
    <text x="323" y="364" fill="#E4EAEE">Feb</text>

    <rect x="350" y="203" width="54" height="137" fill="#DDBC75"/>
    <text x="377" y="185" fill="#F3F7F8">53</text>
    <text x="377" y="200" fill="#FFD36A" font-size="11">-12%</text>
    <text x="377" y="364" fill="#E4EAEE">Mar</text>

    <rect x="404" y="150" width="54" height="190" fill="#B8A4F6"/>
    <text x="431" y="132" fill="#F3F7F8">73</text>
    <text x="431" y="147" fill="#FFD36A" font-size="11">+38%</text>
    <text x="431" y="364" fill="#E4EAEE">Apr</text>

    <rect x="458" y="171" width="54" height="169" fill="#A9D67E"/>
    <text x="485" y="153" fill="#F3F7F8">65</text>
    <text x="485" y="168" fill="#FFD36A" font-size="11">-11%</text>
    <text x="485" y="364" fill="#E4EAEE">May</text>

    <rect x="512" y="119" width="54" height="221" fill="#E7C15F"/>
    <text x="539" y="101" fill="#F3F7F8">85</text>
    <text x="539" y="116" fill="#FFD36A" font-size="11">+31%</text>
    <text x="539" y="364" fill="#E4EAEE">Jun</text>

    <rect x="566" y="137" width="54" height="203" fill="#D98EBC"/>
    <text x="593" y="119" fill="#F3F7F8">78</text>
    <text x="593" y="134" fill="#FFD36A" font-size="11">-8%</text>
    <text x="593" y="364" fill="#E4EAEE">Jul</text>
  </g>

  <text x="350" y="392" text-anchor="middle" fill="#F3F7F8" font-size="14">Month</text>
  <text x="31" y="210" text-anchor="middle" fill="#F3F7F8" font-size="14" transform="rotate(-90 31 210)">Sales</text>
</g>
</svg>
