<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MSR value versus origination income as rates move, soft indigo theme</title>
<desc>A soft indigo-gray dark variation of the natural hedge chart with powder blue and muted gold curves.</desc>

<rect x="0" y="0" width="680" height="410" fill="#3D414E"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">
  <rect x="90" y="26" width="12" height="12" rx="3" fill="#92C9FF"/>
  <text x="110" y="36" fill="#D7DAE2" font-size="12">MSR value</text>

  <rect x="210" y="26" width="12" height="12" rx="3" fill="#DDBC75"/>
  <text x="230" y="36" fill="#D7DAE2" font-size="12">Origination income</text>

  <line x1="380" y1="32" x2="404" y2="32" stroke="#BBBFD0" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="412" y="36" fill="#D7DAE2" font-size="12">Combined (the hedge)</text>
</g>

<line x1="80" y1="60" x2="80" y2="340" stroke="#9298AA" stroke-width="0.5" opacity="0.8"/>
<line x1="80" y1="340" x2="620" y2="340" stroke="#9298AA" stroke-width="0.5" opacity="0.8"/>
<line x1="350" y1="60" x2="350" y2="340" stroke="#9298AA" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>

<path d="M80 305 C 180 298, 250 260, 350 200 S 530 105, 620 95" fill="none" stroke="#92C9FF" stroke-width="2.6" stroke-linecap="round"/>
<path d="M80 95 C 180 102, 250 140, 350 200 S 530 295, 620 305" fill="none" stroke="#DDBC75" stroke-width="2.6" stroke-linecap="round"/>
<path d="M80 202 C 200 198, 480 202, 620 198" fill="none" stroke="#BBBFD0" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.88"/>

<circle cx="350" cy="200" r="4" fill="#BBBFD0"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif" fill="#D7DAE2" font-size="12">
  <text x="80" y="362" text-anchor="middle">-2%</text>
  <text x="215" y="362" text-anchor="middle">-1%</text>
  <text x="350" y="362" text-anchor="middle">Today</text>
  <text x="485" y="362" text-anchor="middle">+1%</text>
  <text x="620" y="362" text-anchor="middle">+2%</text>
</g>

<text x="350" y="392" text-anchor="middle" fill="#F1F2F5" font-size="14" font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">Change in market rates</text>
</svg>
