<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MSR value versus origination income as rates move, light mist gray theme</title>
<desc>A 35-darkness mist-gray variation of the natural hedge chart.</desc>

<rect x="0" y="0" width="680" height="410" fill="#A0A4A3"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">
  <rect x="90" y="26" width="12" height="12" rx="3" fill="#257C73"/>
  <text x="110" y="36" fill="#303332" font-size="12">MSR value</text>

  <rect x="210" y="26" width="12" height="12" rx="3" fill="#B26138"/>
  <text x="230" y="36" fill="#303332" font-size="12">Origination income</text>

  <line x1="380" y1="32" x2="404" y2="32" stroke="#575C5A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="412" y="36" fill="#303332" font-size="12">Combined (the hedge)</text>
</g>

<line x1="80" y1="60" x2="80" y2="340" stroke="#666C69" stroke-width="0.6" opacity="0.85"/>
<line x1="80" y1="340" x2="620" y2="340" stroke="#666C69" stroke-width="0.6" opacity="0.85"/>
<line x1="350" y1="60" x2="350" y2="340" stroke="#666C69" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.52"/>

<path d="M80 305 C 180 298, 250 260, 350 200 S 530 105, 620 95" fill="none" stroke="#257C73" stroke-width="2.7" stroke-linecap="round"/>
<path d="M80 95 C 180 102, 250 140, 350 200 S 530 295, 620 305" fill="none" stroke="#B26138" stroke-width="2.7" stroke-linecap="round"/>
<path d="M80 202 C 200 198, 480 202, 620 198" fill="none" stroke="#575C5A" stroke-width="1.6" stroke-dasharray="5 4" opacity="0.9"/>

<circle cx="350" cy="200" r="4" fill="#575C5A"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif" fill="#303332" font-size="12">
  <text x="80" y="362" text-anchor="middle">-2%</text>
  <text x="215" y="362" text-anchor="middle">-1%</text>
  <text x="350" y="362" text-anchor="middle">Today</text>
  <text x="485" y="362" text-anchor="middle">+1%</text>
  <text x="620" y="362" text-anchor="middle">+2%</text>
</g>

<text x="350" y="392" text-anchor="middle" fill="#252827" font-size="14" font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">Change in market rates</text>
</svg>
