<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Sales over the last eleven months with August split</title>
<desc>A lighter slate-blue editorial-style sales histogram with adjacent bars and a highlighted August bar split into control and treatment sections.</desc>

<rect x="0" y="0" width="680" height="410" fill="#56636D"/>

<g font-family="Anthropic Sans, -apple-system, system-ui, Segoe UI, sans-serif">
  <text x="80" y="38" fill="#F3F7F8" font-size="16">Sales over the last eleven months</text>
  <text x="80" y="58" fill="#D7DEE4" font-size="12">August highlighted and split into control / treatment</text>

  <g font-size="12">
    <rect x="456" y="28" width="10" height="10" rx="2" fill="#4F6FC7"/>
    <text x="472" y="37" fill="#D7DEE4">Control</text>
    <rect x="536" y="28" width="10" height="10" rx="2" fill="#A8E3FF"/>
    <text x="552" y="37" fill="#D7DEE4">Treatment</text>
  </g>

  <line x1="80" y1="80" x2="80" y2="340" stroke="#B3BEC6" stroke-width="0.5" opacity="0.72"/>
  <line x1="80" y1="340" x2="620" y2="340" stroke="#B3BEC6" stroke-width="0.5" opacity="0.72"/>

  <line x1="80" y1="275" x2="620" y2="275" stroke="#B3BEC6" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.23"/>
  <line x1="80" y1="210" x2="620" y2="210" stroke="#B3BEC6" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.23"/>
  <line x1="80" y1="145" x2="620" y2="145" stroke="#B3BEC6" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.23"/>

  <g fill="#D7DEE4" font-size="11" text-anchor="end">
    <text x="68" y="344">0</text>
    <text x="68" y="279">25</text>
    <text x="68" y="214">50</text>
    <text x="68" y="149">75</text>
  </g>

  <line x1="570.9" y1="80" x2="570.9" y2="340" stroke="#FFD36A" stroke-width="1" stroke-dasharray="4 5" opacity="0.55"/>
  <text x="595.45" y="76" text-anchor="middle" fill="#FFD36A" font-size="11">Aug split</text>

  <g font-size="12" text-anchor="middle">
    <rect x="80" y="233.4" width="49.09" height="106.6" fill="#7ED7F2"/>
    <text x="104.55" y="216" fill="#F3F7F8">41</text>
    <text x="104.55" y="231" fill="#FFD36A" font-size="11">+3%</text>
    <text x="104.55" y="364" fill="#E4EAEE">Oct</text>

    <rect x="129.09" y="217.8" width="49.09" height="122.2" fill="#F3A46D"/>
    <text x="153.64" y="200" fill="#F3F7F8">47</text>
    <text x="153.64" y="215" fill="#FFD36A" font-size="11">+15%</text>
    <text x="153.64" y="364" fill="#E4EAEE">Nov</text>

    <rect x="178.18" y="194.4" width="49.09" height="145.6" fill="#67D3C5"/>
    <text x="202.73" y="177" fill="#F3F7F8">56</text>
    <text x="202.73" y="192" fill="#FFD36A" font-size="11">+19%</text>
    <text x="202.73" y="364" fill="#E4EAEE">Dec</text>

    <rect x="227.27" y="225.6" width="49.09" height="114.4" fill="#F08B83"/>
    <text x="251.82" y="208" fill="#F3F7F8">44</text>
    <text x="251.82" y="223" fill="#FFD36A" font-size="11">-21%</text>
    <text x="251.82" y="364" fill="#E4EAEE">Jan</text>

    <rect x="276.36" y="184" width="49.09" height="156" fill="#92C9FF"/>
    <text x="300.91" y="166" fill="#F3F7F8">60</text>
    <text x="300.91" y="181" fill="#FFD36A" font-size="11">+36%</text>
    <text x="300.91" y="364" fill="#E4EAEE">Feb</text>

    <rect x="325.45" y="202.2" width="49.09" height="137.8" fill="#DDBC75"/>
    <text x="350" y="185" fill="#F3F7F8">53</text>
    <text x="350" y="200" fill="#FFD36A" font-size="11">-12%</text>
    <text x="350" y="364" fill="#E4EAEE">Mar</text>

    <rect x="374.54" y="150.2" width="49.09" height="189.8" fill="#B8A4F6"/>
    <text x="399.09" y="132" fill="#F3F7F8">73</text>
    <text x="399.09" y="147" fill="#FFD36A" font-size="11">+38%</text>
    <text x="399.09" y="364" fill="#E4EAEE">Apr</text>

    <rect x="423.63" y="171" width="49.09" height="169" fill="#A9D67E"/>
    <text x="448.18" y="153" fill="#F3F7F8">65</text>
    <text x="448.18" y="168" fill="#FFD36A" font-size="11">-11%</text>
    <text x="448.18" y="364" fill="#E4EAEE">May</text>

    <rect x="472.72" y="119" width="49.09" height="221" fill="#E7C15F"/>
    <text x="497.27" y="101" fill="#F3F7F8">85</text>
    <text x="497.27" y="116" fill="#FFD36A" font-size="11">+31%</text>
    <text x="497.27" y="364" fill="#E4EAEE">Jun</text>

    <rect x="521.81" y="137.2" width="49.09" height="202.8" fill="#D98EBC"/>
    <text x="546.36" y="119" fill="#F3F7F8">78</text>
    <text x="546.36" y="134" fill="#FFD36A" font-size="11">-8%</text>
    <text x="546.36" y="364" fill="#E4EAEE">Jul</text>

    <rect x="570.9" y="100.8" width="49.09" height="135.2" fill="#A8E3FF"/>
    <rect x="570.9" y="236" width="49.09" height="104" fill="#4F6FC7"/>
    <rect x="570.9" y="100.8" width="49.09" height="239.2" fill="none" stroke="#FFD36A" stroke-width="2.2"/>
    <line x1="570.9" y1="236" x2="619.99" y2="236" stroke="#F3F7F8" stroke-width="0.9" opacity="0.75"/>
    <text x="595.45" y="84" fill="#F3F7F8">92</text>
    <text x="595.45" y="98" fill="#FFD36A" font-size="11">+18%</text>
    <text x="595.45" y="164" fill="#24323A" font-size="9">Treatment</text>
    <text x="595.45" y="179" fill="#24323A" font-size="13">57%</text>
    <text x="595.45" y="284" fill="#EAF1FF" font-size="9">Control</text>
    <text x="595.45" y="299" fill="#FFD36A" font-size="13">43%</text>
    <text x="595.45" y="364" fill="#FFD36A">Aug</text>
  </g>

  <text x="350" y="392" text-anchor="middle" fill="#F3F7F8" font-size="14">Month</text>
  <text x="31" y="210" text-anchor="middle" fill="#F3F7F8" font-size="14" transform="rotate(-90 31 210)">Sales</text>
</g>
</svg>
