<line x1="350" y1="60" x2="350" y2="340" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(137, 135, 129);color:rgb(11, 11, 11);stroke-width:0.5px;stroke-dasharray:3px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

