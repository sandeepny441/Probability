<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Profit Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF2F6; --paper:#FFFFFF; --ink:#172033; --muted:#677386;
    --grid:#E8EDF3; --grid2:#CDD6E0; --head:#F7F9FC;
    --green:#147A5A; --green-lt:#72B99A; --green-tint:#EAF6F1; --red:#B83A4A;
    --mono:'IBM Plex Mono', ui-monospace, Menlo, monospace;
    --sans:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); font-variant-numeric:tabular-nums;}
  .wrap{width:min(210mm,100%); margin:0 auto; padding:18px 14px 26px;}
  header{display:block; margin-bottom:9px;}
  h1{font-weight:700; font-size:22px; line-height:1.12; color:#21496C;}
  .sub{margin-top:4px; color:var(--muted); font-size:11px; line-height:1.35;}
  .board{background:var(--paper); border:1px solid var(--grid2); border-radius:8px; padding:8px;
         box-shadow:0 12px 32px rgba(23,32,51,.08);}
  svg{display:block; width:100%; height:auto;}
  .hd{font-family:var(--mono); font-size:10px; letter-spacing:.1em; fill:var(--muted); font-weight:600;}
  .sec{font-family:var(--mono); font-size:11px; letter-spacing:.1em; fill:var(--ink); font-weight:600;}
  .nm{font-family:var(--sans); font-weight:500; font-size:13px; fill:var(--ink);}
  .nm-b{font-family:var(--sans); font-weight:700; font-size:13.4px; fill:var(--ink);}
  .usd{font-family:var(--mono); font-weight:500; font-size:12px; fill:var(--ink);}
  .usd-b{font-family:var(--mono); font-weight:600; font-size:12px; fill:var(--ink);}
  .bps-g{font-family:var(--mono); font-weight:600; font-size:11.5px; fill:var(--green);}
  .bps-r{font-family:var(--mono); font-weight:600; font-size:11.5px; fill:var(--red);}
  @media (max-width:760px){
    .wrap{padding:14px 10px 18px;}
    .board{padding:5px;}
  }
  @page{size:A4 portrait; margin:10mm;}
  @media print{
    body{background:#fff;}
    .wrap{width:190mm; padding:0;}
    .board{border-color:#CDD6E0; box-shadow:none; break-inside:avoid;}
    h1{font-size:18pt;}
    .sub{font-size:8pt;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Loan Profit Ledger</h1>
    <p class="sub">$400k loan · 6.625% · illustrative</p>
  </header>
  <div class="board"><svg id="fly" viewBox="0 0 720 945" role="img" aria-label="Portrait ledger of lender revenue, costs, and profit per loan"></svg></div>
</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const fmt=v=>'$'+Math.round(v).toLocaleString('en-US');
  const bps=v=>Math.round(v/40);

  /* ---- portrait ledger geometry ---- */
  const W=720;
  const X0=12, XL=282, SP=356, XR=532, XD=632, XB=708;
  const S=0.011, ROW=38, SEC=27, HDR=30, TOP=10;

  const ROWS=[
    {t:'sec', txt:'REVENUE'},
    {t:'in', name:'Sale premium', v:6400},
    {t:'in', name:'Servicing value', v:4600},
    {t:'in', name:'Borrower fees', v:1600},
    {t:'in', name:'Pricing adjustment', v:1500},
    {t:'chk', name:'Total revenue', v:14100},
    {t:'sec', txt:'SALE COSTS'},
    {t:'out', name:'Pricing adjustment', v:1500},
    {t:'out', name:'Broker compensation', v:4000},
    {t:'out', name:'Hedge & lock', v:800},
    {t:'out', name:'Repurchase reserve', v:300},
    {t:'chk', name:'Gross profit', v:7500},
    {t:'sec', txt:'OPERATING COSTS'},
    {t:'out', name:'Underwriting & operations', v:1800},
    {t:'out', name:'Sales support', v:800},
    {t:'out', name:'Technology', v:700},
    {t:'out', name:'Overhead', v:600},
    {t:'chk', name:'Operating profit', v:3600},
    {t:'sec', txt:'TAX'},
    {t:'out', name:'Tax', v:850},
    {t:'fin', name:'Net profit', v:2750},
  ];

  const H = TOP+HDR+ROWS.reduce((a,r)=>a+(r.t==='sec'?SEC:ROW),0)+10;
  $('fly').setAttribute('viewBox', '0 0 '+W+' '+H);

  let bgs='', grid='', bars='', txt='';

  /* ---- header row ---- */
  let y=TOP;
  bgs+='<rect x="'+X0+'" y="'+y+'" width="'+(XB-X0)+'" height="'+HDR+'" fill="var(--head)"/>';
  const hcy=y+HDR/2+3.5;
  txt+='<text class="hd" x="'+(X0+10)+'" y="'+hcy+'">ITEM</text>';
  txt+='<text class="hd" text-anchor="middle" x="'+((XL+XR)/2)+'" y="'+hcy+'">CHANGE</text>';
  txt+='<text class="hd" text-anchor="end" x="'+(XD-10)+'" y="'+hcy+'">$</text>';
  txt+='<text class="hd" text-anchor="end" x="'+(XB-10)+'" y="'+hcy+'">BPS</text>';
  y+=HDR;

  /* ---- body rows ---- */
  const rowLines=[TOP, y];
  ROWS.forEach(r=>{
    const h=(r.t==='sec')?SEC:ROW, cy=y+h/2+3.8;
    if(r.t==='sec'){
      bgs+='<rect x="'+X0+'" y="'+y+'" width="'+(XB-X0)+'" height="'+h+'" fill="var(--head)"/>';
      txt+='<text class="sec" x="'+(X0+10)+'" y="'+cy+'">'+r.txt+'</text>';
    } else if(r.t==='out'){
      const w=r.v*S;
      bars+='<rect x="'+(SP-w)+'" y="'+(y+6)+'" width="'+w+'" height="'+(h-12)+'" rx="5" fill="var(--red)"/>';
      txt+='<text class="nm" x="'+(X0+10)+'" y="'+cy+'">'+r.name+'</text>';
      txt+='<text class="usd" text-anchor="end" x="'+(XD-10)+'" y="'+cy+'">('+fmt(r.v)+')</text>';
      txt+='<text class="bps-r" text-anchor="end" x="'+(XB-10)+'" y="'+cy+'">\u2212'+bps(r.v)+'</text>';
    } else {
      const w=r.v*S, isIn=(r.t==='in');
      if(!isIn) bgs+='<rect x="'+X0+'" y="'+y+'" width="'+(XB-X0)+'" height="'+h+'" fill="var(--green-tint)"/>';
      bars+='<rect x="'+SP+'" y="'+(y+6)+'" width="'+w+'" height="'+(h-12)+'" rx="5" fill="'+(isIn?'var(--green-lt)':'var(--green)')+'"/>';
      txt+='<text class="'+(isIn?'nm':'nm-b')+'" x="'+(X0+10)+'" y="'+cy+'">'+r.name+'</text>';
      txt+='<text class="'+(isIn?'usd':'usd-b')+'" text-anchor="end" x="'+(XD-10)+'" y="'+cy+'">'+fmt(r.v)+'</text>';
      txt+='<text class="bps-g" text-anchor="end" x="'+(XB-10)+'" y="'+cy+'">+'+bps(r.v)+'</text>';
      if(r.t==='chk'||r.t==='fin'){ // accounting rule above subtotal
        grid+='<line x1="'+X0+'" x2="'+XB+'" y1="'+y+'" y2="'+y+'" stroke="var(--grid2)" stroke-width="1.4"/>';
      }
      if(r.t==='fin'){ // double rule under the total
        grid+='<line x1="'+X0+'" x2="'+XB+'" y1="'+(y+h)+'" y2="'+(y+h)+'" stroke="var(--ink)" stroke-width="1.4"/>';
        grid+='<line x1="'+X0+'" x2="'+XB+'" y1="'+(y+h+3)+'" y2="'+(y+h+3)+'" stroke="var(--ink)" stroke-width="1.4"/>';
      }
    }
    y+=h; rowLines.push(y);
  });

  /* ---- grid lines ---- */
  rowLines.forEach(ry=>{ grid+='<line x1="'+X0+'" x2="'+XB+'" y1="'+ry+'" y2="'+ry+'" stroke="var(--grid)" stroke-width=".85"/>'; });
  [XL,XR,XD].forEach(vx=>{ grid+='<line x1="'+vx+'" x2="'+vx+'" y1="'+TOP+'" y2="'+y+'" stroke="var(--grid)" stroke-width=".9"/>'; });
  grid+='<rect x="'+X0+'" y="'+TOP+'" width="'+(XB-X0)+'" height="'+(y-TOP)+'" fill="none" stroke="var(--grid2)" stroke-width="1"/>';
  // spine
  grid+='<line x1="'+SP+'" x2="'+SP+'" y1="'+TOP+'" y2="'+y+'" stroke="var(--ink)" stroke-width="1.35"/>';

  $('fly').innerHTML=bgs+grid+bars+txt;
})();
</script>
</body>
</html>
